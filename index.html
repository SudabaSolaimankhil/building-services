<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="marzia.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</head>

<body>
  <!-- HERO SECTION (Start) -->
  <section class="hero-section">
    <div class="overlay"></div>

    <div class="container h-100 mt-4">
      <div class="row align-items-center h-100">

        <!-- Left content -->
        <div class="col-lg-7 col-md-8">


          <h1 class="hero-title fw-bold mb-4 animate__animated animate__fadeInUp mt-5">
            Building
          </h1>

          <h3 class="lead hero-title text-h1  ms-5 mb-4 animate__animated animate__fadeInUp animate__delay-1s">
            Services
          </h3>



          <!-- Stats boxes -->
          <div class="row  g-3 ">
            <div class="col-6 col-sm-6 col-md-6 col-lg-3 card-floating ">
              <div class="card position-relative overflow-hidden border-0  h-100 rounded-4">
                <img src="urban renewal project featuring old industrial buildings transformed into modern apartments with sle.jpg" class="w-100  h-100 card-img" alt="building-img">
                <div class="card-overlay position-absolute top-0 start-0 w-100 h-100
                    d-flex align-items-center justify-content-center flex-column">
                  <h5 class="text-white fw-bold">Herat</h5>
                  <p class="text-white small">Herat building</p>
                </div>
              </div>
            </div>

            <div class="col-6 col-sm-6 col-md-6 col-lg-3 card-floating">
              <div class="card position-relative overflow-hidden border-0 rounded-4 h-100">
                <img src="modern office building in the city.jpg" class="w-100 h-100 card-img" alt="building-img">
                <div class="card-overlay position-absolute top-0 start-0 w-100 h-100
                    d-flex align-items-center justify-content-center flex-column">
                  <h5 class="text-white fw-bold">Belkh</h5>
                  <p class="text-white small">belkh building</p>
                </div>
              </div>
            </div>

            <div class="col-6 col-sm-6 col-md-6 col-lg-3 card-floating">
              <div class="card position-relative overflow-hidden  h-100 border-0 rounded-4">
                <img src="Flats in Mohali_ A Complete Guide to Finding Your Dream Home.jpg" class="w-100  h-100 card-img" alt="building-img">
                <div class="card-overlay position-absolute top-0 start-0 w-100 h-100
                    d-flex align-items-center justify-content-center flex-column">
                  <h5 class="text-white fw-bold">kabul</h5>
                  <p class="text-white small">kabul building</p>
                </div>
              </div>
            </div>

            <div class="col-6 col-sm-6 col-md-6 col-lg-3 card-floating">
              <div class="card position-relative overflow-hidden  h-100 border-0 rounded-4">
                <img src="Commercial Design By Akhtar Rasool Architects.webp" class="w-100  h-100 card-img" alt="building-img">
                <div class="card-overlay position-absolute top-0 start-0 w-100 h-100
                    d-flex align-items-center justify-content-center flex-column">
                  <h5 class="text-white fw-bold">mazar</h5>
                  <p class="text-white small">mazar building</p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right image -->
                <div class="col-12 col-md-8 col-lg-5 p-lg-5 ">
                    <!-- Replace src with your own image path -->
                    <img src="Cities.jpg" alt="Feature"
                        class="img-fluid rounded-4 shadow-lg animate__animated animate__zoomIn">
                </div>

            </div>
        </div>
    </section>
</body>

</html>
